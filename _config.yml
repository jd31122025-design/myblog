title: My Test Desk
description: Reading - Writing - Publishing - This & That
author: "© 2002 - 2024 My Test Desk"
show_downloads: false

# Build settings
theme: minima
plugins:
  - jekyll-feed

#base_url: 

# Minima social links
#github_username: 
#linkedin_username:
#rss: rss

sass:
  quiet_deps: true
  silence_deprecations: [import]

# Minima: show excerpts in the frontpage
show_excerpts: true
excerpt_separator: 

minima:
  date_format: "%d %B %Y"

# Minima: custom header links
header_pages:
  - _pages/about.md
  - _pages/blog.md
  - _pages/my-books.md
  - _pages/for-writers.md
  - _pages/for-readers.md
  - _pages/contact.md

exclude: 
    - .gitignore
    - docker-compose.yml
    - Gemfile
    - Gemfile.lock
    - LICENSE
    - README.md